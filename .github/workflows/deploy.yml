name: deploy
on:
  push:
    branches: [ "main" ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          timeout: 30s
          command_timeout: 30m
          script_stop: true
          debug: true
          script: |
            set -e
            echo "Connected. Host: $(hostname)"
            /bin/bash -lc "set -euxo pipefail; cd /www/wwwroot/binart.cn; bash ./deploy.sh"
